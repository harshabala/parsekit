name: CI

on:
  push:
    branches: [master, fix/*]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend unit tests
        run: npm test

      - name: Svelte typecheck
        run: npm run check

      - name: Rust unit tests
        run: cargo test
        working-directory: src-tauri